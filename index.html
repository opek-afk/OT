<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>เข้าสู่ระบบ พิมานใจ โฮมแคร์</title>
  <style>
    :root{--accent:#2b7aef;--accent-2:#06b6d4;--dark:#0f172a;--line:#cbd5e9;--bg:#f0f7ff;--card:#ffffff;--danger:#dc2626}
    *{box-sizing:border-box} body{margin:0;font-family:"Sarabun","Tahoma",sans-serif;background:var(--bg);color:var(--dark)}
    header{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:white;padding:18px 24px;border-bottom:1px solid rgba(0,0,0,0.06);text-align:center}
    h1{margin:0;font-size:28px} .sub{margin-top:6px;font-size:16px}
    .wrap{max-width:520px;margin:32px auto;padding:0 14px}.card{background:var(--card);border-radius:20px;padding:24px;box-shadow:0 9px 30px rgba(0,0,0,.08)}
    label{display:block;margin-bottom:8px;font-weight:700;font-size:14px} input,button{width:100%;padding:12px 14px;border:1px solid #cbd5e1;border-radius:12px;font-family:inherit;font-size:15px}
    input{margin-bottom:16px} button{cursor:pointer;background:var(--accent-2);color:white;border:0;font-weight:700}
    .link{display:block;margin-top:14px;text-align:center;color:var(--accent);text-decoration:none;font-weight:700}
    .message{padding:12px 14px;border-radius:12px;margin-bottom:14px;background:#e0f2fe;color:#0369a1;display:none}
    .message.error{background:#fee2e2;color:#b91c1c}
  </style>
</head>
<body>
<header>
  <h1>เข้าสู่ระบบ</h1>
  <div class="sub">ระบบลงเวลาปฏิบัติงาน พิมานใจ โฮมแคร์</div>
</header>
<div class="wrap">
  <div class="card">
    <div id="message" class="message"></div>
    <label>ชื่อผู้ใช้</label>
    <input id="username" placeholder="username" />
    <label>รหัสผ่าน</label>
    <input id="password" type="password" placeholder="password" />
    <button onclick="loginUser()">เข้าสู่ระบบ</button>
    <a class="link" href="register.html">สมัครสมาชิก</a>
  </div>
</div>
<script>
const $ = id => document.getElementById(id);
const usersKey = 'pimanjai_users';
const currentUserKey = 'pimanjai_current_user';
const logsKey = 'pimanjai_user_logs';
function loadUsers(){ return JSON.parse(localStorage.getItem(usersKey) || '[]'); }
function storeUsers(users){ localStorage.setItem(usersKey, JSON.stringify(users)); }
function loadLogs(){ return JSON.parse(localStorage.getItem(logsKey) || '[]'); }
function storeLogs(logs){ localStorage.setItem(logsKey, JSON.stringify(logs)); }
function ensureDefaultAdmin(){ const users = loadUsers(); if(!users.find(u=>u.username==='admin')){ users.push({ fullName:'Admin', username:'admin', password:'admin123', role:'admin' }); storeUsers(users); }}
function showMessage(text, isError=false){ const msg=$('message'); msg.textContent=text; msg.className='message' + (isError?' error':''); msg.style.display='block'; }
function addLog(username, role, action){ const logs = loadLogs(); logs.unshift({ id: Date.now(), username, role, action, time: new Date().toISOString() }); storeLogs(logs); }
function loginUser(){ const username=$('username').value.trim(); const password=$('password').value; if(!username || !password){ showMessage('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน', true); return; } const users=loadUsers(); const user=users.find(u=>u.username===username && u.password===password); if(!user){ showMessage('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง', true); return; } sessionStorage.setItem(currentUserKey, JSON.stringify(user)); addLog(user.username, user.role, 'login'); showMessage('เข้าสู่ระบบสำเร็จ กำลังไปหน้าต่อไป...'); setTimeout(()=>{ location.href = user.role==='admin' ? 'admin.html' : 'app.html'; }, 800); }
window.addEventListener('load', ()=>{ ensureDefaultAdmin(); const current = sessionStorage.getItem(currentUserKey); if(current){ const user = JSON.parse(current); location.href = user.role==='admin' ? 'admin.html' : 'app.html'; }});
</script>
</body>
</html>
